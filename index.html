<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2C1810" />
    <meta name="description" content="Explore lost American treasures, the Gold Rush era, and Western legends through AI-generated vintage infographics.">
    <title>American Gold Archives - Lost History</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2534/2534204.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              parchment: {
                100: '#FFFEFA', // Cleaner white/cream
                200: '#F5F0E6', // Light beige
                300: '#EBE5D5', // Base paper color
                400: '#D4C5A9',
                500: '#C9B28F', 
                600: '#A6906E',
                700: '#857053',
              },
              ink: {
                900: '#111111', // Almost pure black for text
                800: '#2A2420', // Dark Charcoal
                700: '#4A403A',
                600: '#5E3A2A',
                500: '#8A5A44',
                red: '#A83232', // More vibrant red
                gold: '#B8860B', // Added Gold for accents
              }
            },
            fontFamily: {
              display: ['"Playfair Display"', 'serif'], // Clean Editorial Serif
              body: ['"Lato"', 'sans-serif'], // Very readable Sans
              accent: ['"Cinzel"', 'serif'], // For small caps labels
            },
            backgroundImage: {
              'paper-texture': 'url("https://www.transparenttextures.com/patterns/cream-paper.png")', // Subtler texture
              'wood-grain': 'linear-gradient(to bottom, #1a1614, #26201c)',
              'vignette': 'radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.4) 100%)',
              'fabric-texture': 'url("https://www.transparenttextures.com/patterns/sacking.png")', // Ancient cloth texture
            },
            boxShadow: {
              'paper': '0 10px 30px -5px rgba(0, 0, 0, 0.3)',
            }
          }
        }
      }
    </script>
    <!-- Fonts: Playfair (Elegant), Lato (Clean), Cinzel (Classic) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-ink-800 bg-wood-grain text-ink-900 font-body antialiased min-h-screen overflow-x-hidden selection:bg-ink-red selection:text-white">
    <div id="root" class="bg-vignette min-h-screen"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
